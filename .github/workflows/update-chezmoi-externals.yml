name: Update chezmoi externals

on:
  schedule:
    # Sunday night in US time zones / early Monday UTC.
    - cron: "17 05 * * 1"
  workflow_dispatch:
  push:
    branches:
      - update/chezmoi-externals

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update chezmoi external pins and checksums
        run: python3 scripts/update_chezmoi_externals.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update chezmoi externals
          title: Update chezmoi externals
          body: |
            Automated update of `.chezmoiexternal.toml` pins and checksum metadata.

            This PR is opened when the updater finds a diff, including the first run that adds checksum metadata.
          branch: update/chezmoi-externals
          delete-branch: true
